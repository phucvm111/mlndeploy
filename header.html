<script>
  // Dark Mode Toggle Logic
  (function() {
    const toggleBtn = document.getElementById("theme-toggle-btn");
    const toggleIcon = document.getElementById("theme-toggle-icon");
    
    function applyTheme(theme) {
      if (theme === "dark") {
        document.documentElement.classList.add("dark");
        document.documentElement.classList.remove("light");
        if (toggleIcon) toggleIcon.innerText = "light_mode";
      } else {
        document.documentElement.classList.remove("dark");
        document.documentElement.classList.add("light");
        if (toggleIcon) toggleIcon.innerText = "dark_mode";
      }
    }
    
    const savedTheme = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(savedTheme);
    
    if (toggleBtn) {
      toggleBtn.addEventListener("click", () => {
        const currentTheme = document.documentElement.classList.contains("dark") ? "dark" : "light";
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        localStorage.setItem("theme", newTheme);
        applyTheme(newTheme);
        window.dispatchEvent(new Event("themechanged"));
      });
    }
  })();

  // Add shadow to header on scroll
  window.addEventListener("scroll", function () {
    const header = document.getElementById("main-header");
    if (header && window.scrollY > 10) {
      header.classList.add("shadow-md");
      header.style.backgroundColor = document.documentElement.classList.contains("dark") ? "rgba(18, 24, 38, 0.85)" : "rgba(250, 248, 243, 0.85)";
    } else if (header) {
      header.classList.remove("shadow-md");
      header.style.backgroundColor = "";
    }
  });

  // Search functionality
  document.addEventListener("DOMContentLoaded", function () {
    const searchInput = document.getElementById("search-input");
    const searchResults = document.getElementById("search-results");
    const searchContainer = document.getElementById("search-container");
    let selectedIndex = -1;

    if (!searchInput || !searchResults) {
      console.error("Search elements not found");
      return;
    }

    if (typeof searchData === "undefined") {
      console.error("searchData is not loaded.");
      return;
    }

    // Search function
    function performSearch(query) {
      if (!query || query.trim().length < 2) {
        searchResults.classList.add("hidden");
        return;
      }

      query = query.toLowerCase().trim();

      // Filter search data
      const results = searchData
        .filter((item) => {
          return (
            item.title.toLowerCase().includes(query) ||
            item.subtitle.toLowerCase().includes(query) ||
            item.keywords.some((keyword) =>
              keyword.toLowerCase().includes(query),
            )
          );
        })
        .slice(0, 8); // Limit to 8 results

      displayResults(results, query);
    }

    // Display results
    function displayResults(results, query) {
      if (results.length === 0) {
        searchResults.innerHTML = `
                    <div class="p-4 text-center text-slate-500">
                        <span class="material-symbols-outlined text-3xl mb-2 opacity-50 text-[#D4A017]">search_off</span>
                        <p class="text-sm">Không tìm thấy kết quả cho "${query}"</p>
                    </div>
                `;
        searchResults.classList.remove("hidden");
        return;
      }

      const prefix = window.componentPrefix || '';

      const html = results
        .map(
          (item, index) => `
                <a href="${prefix}${item.url}" 
                   class="search-result-item flex items-start gap-3 p-3 hover:bg-[#D4A017]/10 dark:hover:bg-[#D4A017]/15 transition-colors cursor-pointer border-b border-slate-100 dark:border-slate-800 last:border-b-0"
                   data-index="${index}">
                    <div class="flex-shrink-0 w-9 h-9 rounded-lg bg-[#D4A017]/10 flex items-center justify-center text-[#D4A017]">
                        <span class="material-symbols-outlined text-[18px]">${item.icon}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-medium text-xs md:text-sm text-slate-900 dark:text-slate-150 truncate">${highlightText(item.title, query)}</div>
                        <div class="text-[10px] md:text-xs text-slate-500 truncate">${item.subtitle}</div>
                        <div class="text-[10px] text-[#D4A017] font-semibold mt-0.5 capitalize">${getTypeLabel(item.type)}</div>
                    </div>
                </a>
            `,
        )
        .join("");

      searchResults.innerHTML = html;
      searchResults.classList.remove("hidden");
      selectedIndex = -1;
    }

    // Highlight matching text
    function highlightText(text, query) {
      const regex = new RegExp(`(${escapeRegex(query)})`, "gi");
      return text.replace(
        regex,
        '<mark class="bg-[#D4A017]/25 text-slate-900 dark:text-[#FAF8F3] rounded px-0.5">$1</mark>',
      );
    }

    // Escape special regex characters
    function escapeRegex(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    // Get type label in Vietnamese
    function getTypeLabel(type) {
      const labels = {
        module: "Module",
        concept: "Khái niệm",
        practice: "Thực hành",
        game: "Trò chơi",
        page: "Trang",
      };
      return labels[type] || type;
    }

    // Event listeners
    searchInput.addEventListener("input", function (e) {
      performSearch(e.target.value);
    });

    searchInput.addEventListener("focus", function (e) {
      if (e.target.value.trim().length >= 2) {
        performSearch(e.target.value);
      }
    });

    // Keyboard navigation
    searchInput.addEventListener("keydown", function (e) {
      const items = searchResults.querySelectorAll(".search-result-item");

      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
        updateSelection(items);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, -1);
        updateSelection(items);
      } else if (e.key === "Enter" && selectedIndex >= 0) {
        e.preventDefault();
        items[selectedIndex].click();
      } else if (e.key === "Escape") {
        searchResults.classList.add("hidden");
        searchInput.blur();
      }
    });

    // Update selection highlight
    function updateSelection(items) {
      items.forEach((item, index) => {
        if (index === selectedIndex) {
          item.classList.add("bg-[#D4A017]/10");
          item.scrollIntoView({ block: "nearest" });
        } else {
          item.classList.remove("bg-[#D4A017]/10");
        }
      });
    }

    // Click outside to close
    document.addEventListener("click", function (e) {
      if (searchContainer && !searchContainer.contains(e.target)) {
        searchResults.classList.add("hidden");
      }
    });

    // Prevent dropdown from closing when clicking inside
    searchResults.addEventListener("click", function (e) {
      e.stopPropagation();
    });
  });

  // Smart navigation for Modules link
  document.addEventListener("DOMContentLoaded", function () {
    const modulesLink = document.getElementById("modules-link");
    if (modulesLink) {
      modulesLink.addEventListener("click", function (e) {
        const currentPage =
          window.location.pathname.split("/").pop() || "home.html";

        if (currentPage === "home.html" || currentPage === "") {
          e.preventDefault();
          const overviewSection = document.getElementById("overview");
          if (overviewSection) {
            overviewSection.scrollIntoView({ behavior: "smooth" });
          }
        }
      });
    }

    // Update active nav link based on scroll position (only on home page)
    const currentPage =
      window.location.pathname.split("/").pop() || "home.html";
    if (currentPage === "home.html" || currentPage === "") {
      function updateNavOnScroll() {
        const overviewSection = document.getElementById("overview");
        if (!overviewSection) return;

        const overviewTop = overviewSection.getBoundingClientRect().top;
        const threshold = 220; 

        const homeLink = document.querySelector('a[href="home.html"]');
        const modulesLinkNav = document.getElementById("modules-link");

        const activeClass = "nav-link px-3 py-2 rounded-xl text-[#D4A017] dark:text-[#FAF8F3] text-sm font-bold border-b-2 border-[#D4A017] flex items-center";
        const inactiveClass = "nav-link px-3 py-2 rounded-xl text-slate-600 dark:text-slate-300 text-sm font-medium transition-all duration-300 link-gold-hover flex items-center";

        if (overviewTop <= threshold) {
          if (homeLink) homeLink.className = inactiveClass;
          if (modulesLinkNav) modulesLinkNav.className = activeClass;
        } else {
          if (homeLink) homeLink.className = activeClass;
          if (modulesLinkNav) modulesLinkNav.className = inactiveClass;
        }
      }

      window.addEventListener("scroll", updateNavOnScroll);
      setTimeout(updateNavOnScroll, 100);
    }
  });
</script>
